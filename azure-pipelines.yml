trigger: none
pr: none

parameters:
- name: agentPayload
  type: string
  default: '{}'

variables:
- name: vmImage
  value: ubuntu-latest
- name: queueAgentPayload
  value: ''
- name: agentPayload
  value: ''
- name: imageRepository
  value: agentops-webhook
- name: dockerfilePath
  value: Dockerfile
- name: buildContext
  value: .
# Update these names to match existing service connections in Azure DevOps.
- name: containerRegistryServiceConnection
  value: AgentOps-ACR-SCC
- name: azureSubscriptionServiceConnection
  value: AgentOps-AzureRM-SC
- name: acrLoginServer
  value: crcommunitydashansi.azurecr.io
- name: resourceGroup
  value: rg-community-dashboard
- name: containerAppName
  value: ca-community-dashboard
- name: appPort
  value: '8080'

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildAndPush
    pool:
      vmImage: $(vmImage)
    steps:
    - task: Docker@2
      displayName: Build and push image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(containerRegistryServiceConnection)
        buildContext: $(buildContext)
        tags: |
          $(Build.BuildId)
          latest

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  jobs:
  - deployment: DeployContainerApp
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Update container app revision
            inputs:
              azureSubscription: $(azureSubscriptionServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az extension add --name containerapp --upgrade --only-show-errors

                IMAGE="$(acrLoginServer)/$(imageRepository):$(Build.BuildId)"
                PAYLOAD_INPUT='${{ parameters.agentPayload }}'
                if [ -n "${QUEUE_AGENT_PAYLOAD:-}" ]; then
                  PAYLOAD_INPUT="$QUEUE_AGENT_PAYLOAD"
                fi

                if [ -n "${AGENT_PAYLOAD:-}" ]; then
                  PAYLOAD_INPUT="$AGENT_PAYLOAD"
                fi

                # Copilot Studio Queue a new build sends values in Build.Parameters.
                if [ -n "${BUILD_PARAMETERS_RAW:-}" ]; then
                  PARAM_AGENT_PAYLOAD="$(python3 -c 'import json,os; raw=os.environ.get("BUILD_PARAMETERS_RAW", "").strip(); first=json.loads(raw) if raw and (raw.startswith("{") or raw.startswith("\"{")) else {}; data=json.loads(first) if isinstance(first, str) and first.strip().startswith("{") else first; v=data.get("agentPayload", "") if isinstance(data, dict) else ""; print(v if isinstance(v, str) else json.dumps(v))' 2>/dev/null || true)"

                  if [ -n "${PARAM_AGENT_PAYLOAD:-}" ]; then
                    PAYLOAD_INPUT="$PARAM_AGENT_PAYLOAD"
                  fi
                fi

                PAYLOAD_B64="$(printf '%s' "$PAYLOAD_INPUT" | base64 -w 0)"
                EVENT_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

                az containerapp ingress update \
                  --name "$(containerAppName)" \
                  --resource-group "$(resourceGroup)" \
                  --target-port "$(appPort)"

                az containerapp update \
                  --name "$(containerAppName)" \
                  --resource-group "$(resourceGroup)" \
                  --image "$IMAGE" \
                  --set-env-vars COPILOT_AGENT_PAYLOAD_B64="$PAYLOAD_B64" COPILOT_EVENT_TIMESTAMP="$EVENT_TIME" BUILD_BUILDID="$(Build.BuildId)" PORT="$(appPort)"

                az containerapp revision list \
                  --name "$(containerAppName)" \
                  --resource-group "$(resourceGroup)" \
                  --query "[0].name" -o tsv
            env:
              QUEUE_AGENT_PAYLOAD: $(queueAgentPayload)
              AGENT_PAYLOAD: $(agentPayload)
              BUILD_PARAMETERS_RAW: $(Build.Parameters)
